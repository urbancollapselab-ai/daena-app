name: Build Daena Apps

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: daena-app

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Desktop — ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci || npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # Upload platform-specific artifacts
      - name: Upload macOS DMG
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: daena-${{ matrix.name }}
          path: |
            daena-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            daena-app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 30

      - name: Upload Windows installer
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: daena-${{ matrix.name }}
          path: |
            daena-app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            daena-app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload Linux packages
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: daena-${{ matrix.name }}
          path: |
            daena-app/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            daena-app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    name: Mobile — Android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install frontend deps
        run: npm ci || npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Init Android project
        run: cargo tauri android init

      - name: Build Android APK
        run: cargo tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: daena-Android
          path: |
            daena-app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    name: Mobile — iOS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install frontend deps
        run: npm ci || npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Init iOS project
        run: cargo tauri ios init

      - name: Build iOS App Structure (Without codesign)
        run: |
          cargo tauri ios build || echo "Codesign will fail without Apple Certs, creating raw app bundle..."
          
      - name: Create IPA payload (Sideloadable)
        run: |
          mkdir -p Payload
          cp -r daena-app/src-tauri/target/aarch64-apple-ios/release/bundle/ios/*.app Payload/ 2>/dev/null || echo "No .app"
          zip -r Daena_v10.ipa Payload
          
      - name: Upload iOS IPA (For AltStore)
        uses: actions/upload-artifact@v4
        with:
          name: daena-iOS-Sideload
          path: Daena_v10.ipa
          retention-days: 30
